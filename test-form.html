<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - Formulaire Scénario</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Lexend', sans-serif; 
            padding: 20px; 
            max-width: 800px; 
            margin: 0 auto;
            background: #f6f7f8;
        }
        .form-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .form-group { margin-bottom: 16px; }
        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #374151;
        }
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
        }
        .form-textarea { min-height: 100px; resize: vertical; }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #137fec;
            color: white;
        }
        .btn-primary:hover { background: #0b5db0; }
        .required { color: #ef4444; }
        
        .log { 
            background: #f5f5f5; 
            padding: 10px; 
            margin: 5px 0; 
            border-radius: 4px; 
            font-family: monospace; 
            font-size: 12px; 
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        
        .material-symbols-outlined { 
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        
        .scenarios-list {
            margin-top: 20px;
        }
        .scenario-item {
            background: white;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 8px;
            border-left: 4px solid #137fec;
        }
        .scenario-title { font-weight: 600; }
        .scenario-meta { font-size: 0.85rem; color: #64748b; margin-top: 4px; }
    </style>
</head>
<body>
    <h1>🧪 Test du formulaire de scénario</h1>
    
    <div class="form-card">
        <h2 style="margin-bottom: 16px;">Nouveau Scénario</h2>
        
        <form id="test-form">
            <div class="form-group">
                <label class="form-label">Titre <span class="required">*</span></label>
                <input class="form-input" type="text" id="titre" value="Test Scénario" required>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Entreprise</label>
                    <input class="form-input" type="text" id="entreprise" value="Test Corp">
                </div>
                <div class="form-group">
                    <label class="form-label">Niveau <span class="required">*</span></label>
                    <select class="form-select" id="niveau" required>
                        <option value="seconde" selected>Seconde</option>
                        <option value="premiere">Première</option>
                        <option value="terminale">Terminale</option>
                    </select>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Auteur <span class="required">*</span></label>
                    <input class="form-input" type="text" id="auteur" value="Test User" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Durée</label>
                    <input class="form-input" type="text" id="duree" value="2h">
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">Problématique <span class="required">*</span></label>
                <input class="form-input" type="text" id="problematique" value="Comment tester la sauvegarde?" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Description</label>
                <textarea class="form-textarea" id="description">Description de test</textarea>
            </div>
            
            <div class="form-group">
                <label class="form-label">Compétences (séparées par des virgules)</label>
                <input class="form-input" type="text" id="competences" value="C1.1, C1.2">
            </div>
            
            <button type="submit" class="btn btn-primary">
                <span class="material-symbols-outlined">save</span>
                Enregistrer le scénario
            </button>
        </form>
    </div>
    
    <div class="form-card">
        <h2 style="margin-bottom: 16px;">Logs</h2>
        <div id="logs"></div>
        <button onclick="clearLogs()" class="btn" style="margin-top: 10px; background: #e2e8f0;">Effacer les logs</button>
    </div>
    
    <div class="form-card">
        <h2 style="margin-bottom: 16px;">Scénarios enregistrés</h2>
        <div id="scenarios-list"></div>
        <button onclick="refreshList()" class="btn" style="margin-top: 10px; background: #e2e8f0;">
            <span class="material-symbols-outlined">refresh</span>
            Rafraîchir
        </button>
    </div>

    <script>
        const STORAGE_KEY = 'logistique2025_scenarios';
        
        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = `log ${type}`;
            div.innerHTML = `<strong>[${new Date().toLocaleTimeString()}]</strong> ${msg}`;
            document.getElementById('logs').prepend(div);
            console.log(`[${type}]`, msg);
        }
        
        function clearLogs() {
            document.getElementById('logs').innerHTML = '';
        }
        
        function loadScenarios() {
            try {
                const stored = localStorage.getItem(STORAGE_KEY);
                return stored ? JSON.parse(stored) : [];
            } catch (e) {
                log('Erreur chargement: ' + e.message, 'error');
                return [];
            }
        }
        
        function saveScenarios(scenarios) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(scenarios));
                return true;
            } catch (e) {
                log('Erreur sauvegarde: ' + e.message, 'error');
                return false;
            }
        }
        
        function refreshList() {
            const scenarios = loadScenarios();
            const container = document.getElementById('scenarios-list');
            
            if (scenarios.length === 0) {
                container.innerHTML = '<p style="color: #94a3b8;">Aucun scénario enregistré</p>';
                return;
            }
            
            container.innerHTML = scenarios.map(s => `
                <div class="scenario-item">
                    <div class="scenario-title">${s.titre}</div>
                    <div class="scenario-meta">
                        ${s.niveau} • ${s.duree} • ${s.auteur} • ${s.date}
                    </div>
                </div>
            `).join('');
            
            log(`${scenarios.length} scénario(s) affiché(s)`);
        }
        
        document.getElementById('test-form').addEventListener('submit', function(e) {
            e.preventDefault();
            log('=== Soumission du formulaire ===');
            
            const scenario = {
                titre: document.getElementById('titre').value.trim(),
                entreprise: document.getElementById('entreprise').value.trim(),
                niveau: document.getElementById('niveau').value,
                auteur: document.getElementById('auteur').value.trim(),
                duree: document.getElementById('duree').value.trim() || '2h',
                problematique: document.getElementById('problematique').value.trim(),
                description: document.getElementById('description').value.trim(),
                competences: document.getElementById('competences').value.split(',').map(c => c.trim()).filter(c => c),
                id: 'sc-' + Date.now(),
                date: new Date().toISOString().split('T')[0]
            };
            
            log('Données: ' + JSON.stringify(scenario));
            
            const scenarios = loadScenarios();
            log(`${scenarios.length} scénarios avant ajout`);
            
            scenarios.push(scenario);
            
            if (saveScenarios(scenarios)) {
                log(`✅ Scénario enregistré avec ID: ${scenario.id}`, 'success');
                
                // Vérification
                const verify = loadScenarios();
                log(`${verify.length} scénarios après vérification`);
                
                refreshList();
            } else {
                log('❌ Échec de l\'enregistrement', 'error');
            }
        });
        
        // Charger la liste au démarrage
        refreshList();
    </script>
</body>
</html>
